name: EAS Preview Build

on:
  push:
    branches:
      - main
    paths:
      # Only trigger if mobile app files change (not just backend)
      - 'BigBites/**'
      - '!BigBites/node_modules/**'

jobs:
  build:
    name: EAS Preview Build (Android + iOS)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the code ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ──────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BigBites/package-lock.json

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        working-directory: BigBites
        run: npm ci

      # ── 4. Set up EAS CLI ──────────────────────────────────────────────────
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ── 5. Trigger EAS preview build ───────────────────────────────────────
      # --non-interactive: no prompts in CI
      # --no-wait: fire and forget (build runs on EAS servers)
      - name: Build preview (Android)
        working-directory: BigBites
        run: eas build --platform android --profile preview --non-interactive --no-wait

      - name: Build preview (iOS)
        working-directory: BigBites
        run: eas build --platform ios --profile preview --non-interactive --no-wait

      # ── 6. Post build URL to PR (optional, nice to have) ───────────────────
      - name: Comment build started
        if: github.event_name == 'push'
        run: |
          echo "✅ EAS Preview builds triggered on push to main."
          echo "Track your builds at: https://expo.dev/accounts/[your-account]/projects/BigBites/builds"
